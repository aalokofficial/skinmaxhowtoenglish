<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- 카톡/SNS 공유시 미리보기 설정 -->
  <meta property="og:title" content="Skinmax Tutorial" />
  <meta property="og:description" content="Skinmax Tutorial Video" />
  <meta property="og:image" content="aaloklogo.png" />
  <meta property="og:url" content="" />

  <title>Skinmax Tutorial</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #000000;
      text-align: center;
      padding: 0 24px;
    }

    .logo-wrap {
      margin-bottom: 32px;
    }
    .logo-wrap img {
      width: 200px;
      height: 200px;
      object-fit: contain;
    }

    .message {
      font-size: 20px;
      line-height: 1.6;
      letter-spacing: 0.02em;
      opacity: 0;
      animation: fadeIn 0.5s ease forwards 0.2s;
    }

    .sub {
      margin-top: 12px;
      font-size: 14px;
      color: #888888;
      opacity: 0;
      animation: fadeIn 0.5s ease forwards 0.5s;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="logo-wrap">
    <img src="aaloklogo.png" alt="Aalok Logo" />
  </div>

  <p class="message" id="msg"></p>
  <p class="sub" id="sub"></p>

  <script>

  /* ============================================================
     ✅ [수정 1] 유튜브 URL
     ----------------------------------------------------------
     ✏️  수정 방법:
         유튜브 링크가 생기면 아래 빈 따옴표 안에 URL 붙여넣기
         예) var YOUTUBE_URL = 'https://www.youtube.com/watch?v=xxxxx';

     📌  비워두면 → "The tutorial video is coming soon." 표시
     📌  링크 넣으면 → 즉시 유튜브로 이동
  ============================================================ */
  var YOUTUBE_URL = '';

  /* ============================================================
     ⬇️  여기서부터는 수정하지 않아도 됩니다
  ============================================================ */

  var msgEl = document.getElementById('msg');
  var subEl = document.getElementById('sub');

  if (YOUTUBE_URL && YOUTUBE_URL.trim() !== '') {
    msgEl.innerHTML = 'Redirecting to video...';
    setTimeout(function() {
      window.location.href = YOUTUBE_URL;
    }, 300);
  } else {
    msgEl.innerHTML = 'The tutorial video is coming soon.';
    subEl.innerHTML = 'Please check back later.';
  }

  </script>

</body>
</html>
